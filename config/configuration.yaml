---
# https://www.home-assistant.io/integrations/default_config/
default_config:

# go2rtc binary is not available in the devcontainer; disable it so default_config loads cleanly.
go2rtc:

# https://www.home-assistant.io/integrations/homeassistant/
homeassistant:
  debug: true

# https://www.home-assistant.io/integrations/logger/
logger:
  default: info
  logs:
    custom_components.plant_sense: debug

mqtt_statestream:
  base_topic: homeassistant/statestream/test
